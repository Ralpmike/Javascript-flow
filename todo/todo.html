<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App - Full CRUD</title>
    <link rel="stylesheet" href="todo.css">
    <style>
        .cta{
            display: flex;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Todo App</h1>
        
        <!-- Create Todo Form -->
        <form id="todo-form">
            <input type="text" name="todo" id="todo-input" placeholder="Enter a new todo...">
            <button type="submit" id="submit" >Add Todo</button>
        </form>

        <!-- Todo List -->
        <div id="todo-list">
            <!-- Todos will be dynamically added here -->
             <!--  -->
        </div>

        <button class="cancel-btn" id="clear"> Clear Todo</button>
    </div>

    <script src="todo.js"></script>
</body>
</html>
